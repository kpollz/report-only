<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="800" height="450" rx="14" fill="#f1f5f9"/>
  <text x="400" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#0f172a">Kiến trúc hệ thống (3 tầng)</text>
  <text x="400" y="72" text-anchor="middle" font-size="14" fill="#64748b">Sơ đồ minh họa — mock data</text>

  <g>
    <rect x="80"  y="120" width="200" height="90" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="180" y="160" text-anchor="middle" font-size="18" font-weight="600" fill="#1e3a8a">Frontend</text>
    <text x="180" y="184" text-anchor="middle" font-size="13" fill="#3b82f6">React + Docusaurus</text>

    <rect x="300" y="120" width="200" height="90" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="400" y="160" text-anchor="middle" font-size="18" font-weight="600" fill="#166534">API Gateway</text>
    <text x="400" y="184" text-anchor="middle" font-size="13" fill="#22c55e">FastAPI</text>

    <rect x="520" y="120" width="200" height="90" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="620" y="160" text-anchor="middle" font-size="18" font-weight="600" fill="#92400e">Database</text>
    <text x="620" y="184" text-anchor="middle" font-size="13" fill="#f59e0b">PostgreSQL</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)">
    <line x1="280" y1="165" x2="298" y2="165"/>
    <line x1="500" y1="165" x2="518" y2="165"/>
  </g>

  <rect x="80" y="280" width="640" height="110" rx="12" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="400" y="320" text-anchor="middle" font-size="18" font-weight="600" fill="#5b21b6">Object Storage (MinIO) — Ảnh &amp; Assets</text>
  <text x="400" y="352" text-anchor="middle" font-size="13" fill="#7c3aed">Lưu trữ hình ảnh, mermaid render cache, tài liệu tĩnh</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
